id: symptom_based
name: 症状描述场景

description: |
  车主描述的是车辆症状而非具体项目，如"车有异响"、"方向盘抖动"、"仪表盘亮灯"。
  需要根据症状推断可能的维修项目。
  不要过度猜测，如果症状不明确，建议车主到店检查。
  可以提供常见症状对应的项目参考，但最终以专业检测为准。

depends_on:
  - 车型信息
  - 车主描述的症状细节

checklist:
  - 收集症状描述（什么情况下出现、频率、严重程度）
  - 根据症状推荐可能的检查或维修项目
  - 如果无法判断，建议到店检查

output:
  - 推荐的检查或维修项目
  - 是否需要到店诊断的建议

cancel_directions:
  症状不明确无法判断: 建议车主到店做专业检测，提供商户推荐
  车主想自己先观察: 记录症状，告知注意事项
