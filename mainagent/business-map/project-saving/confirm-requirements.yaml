id: confirm_requirements
name: 确认特殊需求

description: |
  了解车主是否有特殊要求，如指定品牌机油、全合成、原厂配件等。
  这是可选步骤，大部分车主没有特殊需求，简单确认后即可跳过。
  不要主动推销高端配件，只在车主提到时才深入沟通。

depends_on:
  - 已确认的养车项目（confirm_project 的 output）

checklist:
  - 询问是否有品牌或配件偏好
  - 记录特殊需求（如有）
  - 无特殊需求时快速跳过

output:
  - 特殊需求记录（品牌、配件等级等）
  - 若无特殊需求则标记为"无"

cancel_directions:
  车主不想指定: 标记为无特殊需求，继续下一步
