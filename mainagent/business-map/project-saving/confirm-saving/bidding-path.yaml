id: bidding_path
name: 竞价路径

description: |
  通过商户竞价帮车主获得更优价格。
  发布竞价需求后，多家商户会给出报价，车主可以选择最合适的。
  竞价需要一定等待时间，适合不急的车主。

depends_on:
  - 已确认的养车项目
  - 车主所在区域

checklist:
  - 说明竞价流程和预期等待时间
  - 发布竞价需求
  - 收到报价后帮车主比较分析

output:
  - 竞价发布状态
  - 收到的商户报价列表
  - 车主选定的报价

cancel_directions:
  车主不想等: 引导车主考虑优惠券路径或直接预订
  报价不满意: 可以调整需求重新竞价或选择其他方式
