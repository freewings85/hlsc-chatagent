id: compare
name: 比较商户

description: |
  帮车主对比候选商户的优劣。
  从价格、距离、服务评分、可预约时间等维度进行比较。
  突出各商户的差异化优势，帮助车主做决策。
  不要强推某一家，客观呈现信息。

depends_on:
  - 搜索到的商户列表（search 的 output）

checklist:
  - 对比商户的价格差异
  - 对比距离和交通便利性
  - 对比服务评分和用户评价
  - 根据车主关注点重点说明

output:
  - 商户对比分析结果
  - 推荐排序建议

cancel_directions:
  候选商户都不满意: 返回搜索步骤调整条件重新搜索
