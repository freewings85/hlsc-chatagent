id: merchant_search
name: 筛选匹配商户

description: |
  根据车主的项目需求和偏好，搜索并推荐合适的商户。
  按搜索 → 比较 → 确认的顺序推进。
  可以根据距离、评分、价格等维度推荐。

depends_on:
  - 已确认的养车项目（confirm_project 的 output）

checklist:
  - 搜索匹配的商户
  - 帮车主比较筛选
  - 确认最终选择的商户

output:
  - 车主选定的商户信息
  - 商户的服务能力和报价

cancel_directions:
  附近没有合适商户: 扩大搜索范围或建议车主调整需求
  车主想自己找: 提供搜索结果列表供参考

children:
  - id: search
    name: 搜索商户
    keywords: [找店, 搜索, 附近, 推荐门店]

  - id: compare
    name: 比较商户
    keywords: [比较, 对比, 哪家好, 评价, 评分]

  - id: confirm
    name: 确认商户
    keywords: [就这家, 选定, 确认商户, 去这家]
