id: confirm
name: 确认商户

description: |
  车主从候选列表中选定了商户。
  最终确认商户的服务内容、价格和可预约时间。
  确认后进入预订阶段。

depends_on:
  - 商户对比结果（compare 的 output）或车主直接指定

checklist:
  - 确认车主选择的商户
  - 核实商户可做的项目和报价
  - 确认可预约时间段

output:
  - 选定的商户名称和详情
  - 商户确认的服务项目和价格
  - 可预约时间段

cancel_directions:
  车主犹豫不决: 再次说明各商户优势，或建议选最近的先体验
  车主想再看看: 返回搜索步骤
