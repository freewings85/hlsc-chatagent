id: execute
name: 执行预订

description: |
  车主确认方案后，调用预订接口完成下单。
  下单后反馈预订结果，包括订单号、到店时间、商户地址等。
  提醒车主到店注意事项。

depends_on:
  - 车主已确认的预订方案（build_plan 的 output）

checklist:
  - 调用预订接口提交订单
  - 确认预订是否成功
  - 向车主反馈订单信息和到店须知

output:
  - 预订订单号
  - 预约时间
  - 商户地址和联系方式
  - 到店注意事项

cancel_directions:
  预订接口失败: 告知车主稍后重试，保留方案信息
  车主最后反悔: 取消预订，记录已有信息方便后续使用
