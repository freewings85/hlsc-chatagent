id: build_plan
name: 构建预订方案

description: |
  汇总已确认的项目、省钱方案、商户信息，构建完整的预订方案。
  方案需要包含服务项目、价格明细、优惠信息、预约时间、商户地址。
  清晰呈现给车主做最终确认。

depends_on:
  - 已确认的养车项目和省钱方案
  - 选定的商户及其报价
  - 车主的时间偏好

checklist:
  - 汇总所有已确认信息
  - 计算最终价格（含优惠）
  - 确认可预约时间段
  - 生成预订方案摘要供车主确认

output:
  - 完整的预订方案（项目、价格、时间、商户）
  - 车主是否确认

cancel_directions:
  价格不满意: 返回省钱方案重新沟通或更换商户
  时间不合适: 调整预约时间后重新构建方案
