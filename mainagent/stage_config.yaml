# ============================================================
# MainAgent 场景配置
#
# 每个场景声明：
#   prompt_parts — 通用前置 + 输出规范（SYSTEM / SOUL / {scene}/OUTPUT.md），按顺序拼成 system_prompt
#   agent_md     — 按顺序拼接成 agent_md 正文的文件列表（场景角色 + 编排说明）
#   tools        — 该场景允许 LLM 调用的工具（session 内静态，cache 友好）
#                  orchestrated 场景必须带一个「把用户事实登记进会话状态」的工具：
#                    · 场景级（推荐）：submit_shop_search_criteria 等，名字自带业务锚点
#                    · 通用兜底：update_workflow_state（Validate-Loop 未迁的旧场景在用）
#                  二选一，不要同时挂（会让 LLM 选工具时分神）
#   skills       — 该场景可激活的 skill
#
# 场景从 request_context.orchestrator.scenario 驱动：
#   - orchestrator 模式：workflow 的 scenario 决定加载哪个场景
#   - 旧直连路径：BMA 分类决定
# ============================================================

scenes:
  debug:
    prompt_parts: [SYSTEM.md, SOUL.md, debug/OUTPUT.md]
    agent_md:
      - debug/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - submit_shop_search_criteria
    skills: []

  guide:
    prompt_parts: [SYSTEM.md, SOUL.md, guide/OUTPUT.md]
    agent_md:
      - guide/AGENT.md
    tools: []
    skills:
      - saving-methods
      - platform-intro

  platform:
    prompt_parts: [SYSTEM.md, SOUL.md, platform/OUTPUT.md]
    agent_md:
      # 平台预订未上线，暂时不加载业务引导（避免 LLM 按 5W1H 收集预订信息）；
      # 上线时取消下一行注释即可。
      # - platform/AGENT.md
      - orchestrated/AGENT.md
    tools: []
    skills: []

  searchshops:
    prompt_parts: [SYSTEM.md, SOUL.md, searchshops/OUTPUT.md]
    agent_md:
      - searchshops/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - submit_shop_search_criteria
    skills: []

  searchcoupons:
    prompt_parts: [SYSTEM.md, SOUL.md, searchcoupons/OUTPUT.md]
    agent_md:
      - searchcoupons/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - submit_coupon_search_criteria
    skills:
      - saving-methods

  insurance:
    prompt_parts: [SYSTEM.md, SOUL.md, insurance/OUTPUT.md]
    agent_md:
      - insurance/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - collect_vehicle_info
      - collect_insurance_info
      - collect_user_car_info
      - update_workflow_state
    skills: []

  orchestrator:
    prompt_parts: [SYSTEM.md, SOUL.md, orchestrator/OUTPUT.md]
    agent_md:
      - orchestrator/AGENT.md
    tools:
      - delegate
    skills: []
