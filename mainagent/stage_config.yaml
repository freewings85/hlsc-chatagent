# ============================================================
# MainAgent 场景配置
#
# 6 个平等场景，由 BMA 每轮分类路由：
#   - BMA 返回 [] → guide（引导）
#   - BMA 返回 1 个场景 → 该场景
#   - BMA 返回多个场景 → orchestrator（delegate 协调）
#
# 每个场景独立定义 prompt_parts / agent_md / tools / skills
# ============================================================

scenes:
  guide:
    prompt_parts: [SYSTEM.md, SOUL.md, guide/OUTPUT.md]
    agent_md: guide/AGENT.md
    tools:
      - list_user_cars
      - update_session_state
    skills:
      - saving-methods
      - platform-intro

  platform:
    prompt_parts: [SYSTEM.md, SOUL.md, platform/OUTPUT.md]
    agent_md: platform/AGENT.md
    tools:
      - match_project
      - search_shops
      - search_coupon
      - collect_user_car_info
      - collect_user_location
      - list_user_cars
      - confirm_booking
      - update_session_state
    skills:
      - saving-playbook

  searchshops:
    prompt_parts: [SYSTEM.md, SOUL.md, searchshops/OUTPUT.md]
    agent_md: searchshops/AGENT.md
    tools:
      - search_shops
      - collect_user_location
      - classify_project
      - update_session_state
      - call_query_codingagent
      - create_contact_order
    skills:
      - saving-playbook

  searchcoupons:
    prompt_parts: [SYSTEM.md, SOUL.md, searchcoupons/OUTPUT.md]
    agent_md: searchcoupons/AGENT.md
    tools:
      - search_coupon
      - book_coupon
      - collect_user_location
      - classify_project
      - update_session_state
    skills:
      - saving-methods

  insurance:
    prompt_parts: [SYSTEM.md, SOUL.md, insurance/OUTPUT.md]
    agent_md: insurance/AGENT.md
    tools:
      - search_shops
      - collect_user_car_info
      - collect_user_location
      - list_user_cars
      - update_session_state
      - bash  # SDK 内置工具（create_default_tool_map 提供）
    skills:
      - insurance-bidding

  orchestrator:
    prompt_parts: [SYSTEM.md, SOUL.md, orchestrator/OUTPUT.md]
    agent_md: orchestrator/AGENT.md
    tools:
      - delegate
    skills: []
