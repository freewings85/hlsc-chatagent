# ============================================================
# MainAgent 场景配置
#
# 每个场景声明：
#   prompt_parts — 通用前置 + 输出规范（SYSTEM / SOUL / {scene}/OUTPUT.md），按顺序拼成 system_prompt
#   agent_md     — 按顺序拼接成 agent_md 正文的文件列表（场景角色 + 编排说明）
#   tools        — 旧直连路径使用（编排模式下由 orchestrator 的 AICall 指定）
#   skills       — 旧直连路径使用（同上）
#
# 场景从 request_context.orchestrator.scenario 驱动：
#   - orchestrator 模式：workflow 的 scenario 决定加载哪个场景
#   - 旧直连路径：BMA 分类决定
# ============================================================

scenes:
  debug:
    prompt_parts: [SYSTEM.md, SOUL.md, debug/OUTPUT.md]
    agent_md:
      - debug/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - update_workflow_state
    skills: []

  guide:
    prompt_parts: [SYSTEM.md, SOUL.md, guide/OUTPUT.md]
    agent_md:
      - guide/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - list_user_cars
    skills:
      - saving-methods
      - platform-intro

  platform:
    prompt_parts: [SYSTEM.md, SOUL.md, platform/OUTPUT.md]
    agent_md:
      - platform/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - match_project
      - search_shops
      - search_coupon
      - collect_user_car_info
      - collect_user_location
      - list_user_cars
      - confirm_booking
    skills:
      - saving-playbook

  searchshops:
    prompt_parts: [SYSTEM.md, SOUL.md, searchshops/OUTPUT.md]
    agent_md:
      - searchshops/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - search_shops
      - collect_user_location
      - collect_user_car_info
      - classify_project
      - call_query_codingagent
      - bash
    skills:
      - saving-playbook
      - contact-order
      - searchshops-coding

  searchcoupons:
    prompt_parts: [SYSTEM.md, SOUL.md, searchcoupons/OUTPUT.md]
    agent_md:
      - searchcoupons/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - search_coupon
      - claim_coupon
      - collect_user_location
      - classify_project
    skills:
      - saving-methods

  insurance:
    prompt_parts: [SYSTEM.md, SOUL.md, insurance/OUTPUT.md]
    agent_md:
      - insurance/AGENT.md
      - orchestrated/AGENT.md
    tools:
      - search_shops
      - collect_user_car_info
      - collect_user_location
      - list_user_cars
      - bash
    skills:
      - insurance-bidding

  orchestrator:
    prompt_parts: [SYSTEM.md, SOUL.md, orchestrator/OUTPUT.md]
    agent_md:
      - orchestrator/AGENT.md
    tools:
      - delegate
    skills: []
