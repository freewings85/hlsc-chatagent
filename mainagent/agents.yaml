# ============================================================
# MainAgent Agent Registry（agent-graph 简化版）
#
# 每条 agent = 一个独立 LLM 调用配置。/chat/stream2 按 `agent_type` 查表后直接跑。
#
# 字段说明：
# - prompt_parts: list[str]
#     相对 mainagent/prompts/templates/ 的文件路径，按顺序拼成 system prompt
# - agent_md: list[str]
#     相对 templates/ 的 agent_md 文件列表，按顺序拼成 agent_md 正文
# - tools: list[str]
#     session 内静态 tool 列表
# - skills: list[str]
#     该 agent 可激活的 skill
# - load_history: bool
#     true = 装载本 session 的对话历史（跨 scene 共享）；false = 裸跑
# - commit_policy: full | text_only | nothing
#     full: agent.run() 产出的所有新消息全写回 memory
#     text_only: 只写最终 assistant 文本（不持久化 tool 链）
#     nothing: 不写
# ============================================================

agents:
  # ── searchshops：3-phase ─────────────────────────────────────
  searchshops_collect:
    prompt_parts:
      - searchshops/collect/main.md
    agent_md: []
    tools: []
    skills: []
    load_history: true
    commit_policy: full

  searchshops_executing:
