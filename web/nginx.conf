server {
    listen 3100;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API 和 Chat 请求反向代理到 MainAgent
    location /api/ {
        proxy_pass http://mainagent:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /chat/ {
        proxy_pass http://mainagent:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # SPA 路由：所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
