# docker compose up --build
services:
  mainagent:
    build:
      context: .
      dockerfile: mainagent/Dockerfile
    ports:
      - "8100:8100"
    env_file:
      - mainagent/.env.local
    environment:
      # Docker 网络内用容器名访问 subagent
      DEMO_PRICE_FINDER_URL: http://demo-price-finder:8101
    volumes:
      - mainagent-data:/app/mainagent/data
      - mainagent-logs:/app/mainagent/logs
    depends_on:
      - demo-price-finder

  demo-price-finder:
    build:
      context: .
      dockerfile: subagents/demo_price_finder/Dockerfile
    ports:
      - "8101:8101"
    env_file:
      - subagents/demo_price_finder/.env.local
    volumes:
      - demo-pf-data:/app/subagents/demo_price_finder/data
      - demo-pf-logs:/app/subagents/demo_price_finder/logs

  web:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    depends_on:
      - mainagent

volumes:
  mainagent-data:
  mainagent-logs:
  demo-pf-data:
  demo-pf-logs:
