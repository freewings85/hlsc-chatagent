meta:
  name: 养车预订服务业务地图
  version: "1.0"
  description: 节点化导航地图，供小LLM意图分类 + Temporal状态机按图索骥使用
  
# ============================================================
# T1_REQUIREMENTS_COMMUNICATION：需求沟通任务节点
# ============================================================
task_T1:
  id: T1_REQUIREMENTS_COMMUNICATION
  name: 需求沟通
  depends_on: 
  description: 确认养车项目需求及省钱目标，分析并推荐省钱方案
  output:
    - 养车项目清单（含特殊要求）
    - 优惠方案类型（9折/10元券/无需券/无结果-闲聊）
    - 商户清单
  checklist:
  
    - id: NODE_T1_PROJECT_CLARIFY
      name: 梳理养车项目
      description: 梳理养车项目
      depends_on:
      checklist:
      
        - id: NODE_T1_PROJECT_SEARCH
          name: 搜索养车项目
          description: 调用skill(project-demand-clarifier)
          depends_on: 
          output:
            - 养车项目清单
            
        - id: NODE_T1_PROJECT_VEHICLE_CHECK
          name: 判断是否需要用户提供车型
          depends_on: 养车项目清单
          description: 调用skill(project_vehicle_check)，如果返回“是”则查看：NODE_T1_VEHICLE_INFO，否则跳过：NODE_T1_VEHICLE_INFO
          output:
            - 是/否
      output:
        - 养车项目清单

    - id: NODE_T1_VEHICLE_INFO
      name: 确认车型信息
      depends_on:
      description: 引导车主通过专用链接上传车架号；
      output:
        - 车型信息
      cancel_directions: 
        - 若车主不愿提供，请查看：task_T4

    - id: NODE_T1_PROJECT_PRICE
      name: 查询项目报价清单
      description: 调用skill(price-inquiry)
      depends_on:
        - 养车项目清单
      output:
        - 项目报价清单
        
    - id: NODE_T1_SAVING_PLAN
      name: 确认消费偏好并获得省钱方案
      description: 调用skill(saving-strategy-guide)
      depends_on:
        - 养车项目清单
        - 项目报价清单
      output:
        - 优惠券信息

    - id: NODE_T1_MERCHANT_SEARCH
      name: 搜索商户
      depends_on:
      description: 调用skill(merchant-search-and-confirm)
      output:
        - 商户清单

    - id: NODE_T1_MERCHANT_SHOW
      name: 展示商户卡片
      depends_on:
        - 商户清单
      description: 引导车主通过专用链接查看商户清单界面；
      output:

    - id: NODE_T1_ORDER_SHOW
      name: 展示下单卡片
      depends_on:
        - 商户清单
        - 养车项目清单
        - 项目报价清单
      description: 引导车主通过专用链接进入下单界面；
      output:


# ============================================================
# T2：筛选商户任务节点
# ============================================================
task_T2:
