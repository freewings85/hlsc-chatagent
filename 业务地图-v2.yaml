  checklist:

    - id: NODE_T2_MERCHANT_SEARCH
      name: 搜索商户
      depends_on:
      description: 调用skill(merchant-search-and-confirm)
      output:
        - 商户清单

    - id: NODE_T2_MERCHANT_LIST_SHOW
      name: 展示商户清单
      depends_on:
        - 商户清单
      description: 引导车主通过专用链接查看商户清单；
      output:
      
    - id: NODE_T2_PROJECT_CONFIRM
      name: 确认养车项目
      description: 确认养车项目
      depends_on:
        - 商户清单
      checklist:
      
        - id: NODE_T2_PROJECT_SEARCH
          name: 搜索养车项目
          description: 调用skill(project-demand-clarifier)
          depends_on: 
          output:
            - 养车项目清单
            
        - id: NODE_T2_PROJECT_VEHICLE_CHECK
          name: 判断是否需要用户提供车型
          depends_on: 养车项目清单
          description: 调用skill(project_vehicle_check)，如果返回“是”则查看：NODE_T1_VEHICLE_INFO，否则跳过：NODE_T1_VEHICLE_INFO
          output:
            - 是/否
      output:
        - 养车项目清单

    - id: NODE_T2_VEHICLE_INFO
      name: 确认车型信息
      depends_on:
      description: 引导车主通过专用链接上传车架号；
      output:
        - 车型信息
      cancel_directions: 
        - 若车主不愿提供，请查看：task_T4

    - id: NODE_T2_PROJECT_PRICE
      name: 查询项目报价清单
      description: 调用skill(price-inquiry)
      depends_on:
        - 养车项目清单
      output:
        - 项目报价清单
        
    - id: NODE_T2_SAVING_PLAN
      name: 确认消费偏好并获得省钱方案
      description: 调用skill(saving-strategy-guide)
      depends_on:
        - 养车项目清单
        - 项目报价清单
      output:
        - 优惠券信息

    - id: NODE_T2_ORDER_SHOW
      name: 展示下单卡片
      depends_on:
        - 商户清单
        - 养车项目清单
        - 项目报价清单
      description: 引导车主通过专用链接进入下单界面；
      output:


# ============================================================
# T3：预订洗车/检测，让商户师傅协助上传VIN码
# ============================================================
task_T3:
  id: T3_BOOK_WASH
  name: 预订洗车/检测
  description: 预订洗车/检测，让商户师傅协助上传VIN码
  output:
  checklist:
  
    - id: NODE_T3_PROJECT_SELECT
      name: 选择固定项目：洗车/检测
      description: 调用skill(get_wash_package)得到 预订洗车/检测对应的项目清单
      depends_on:
      output:
        - 预订洗车/检测项目
        
    - id: NODE_T3_MERCHANT_SEARCH
      name: 搜索商户
      depends_on:
      description: 调用skill(merchant-search-and-confirm)
      output:
        - 确定一个商户

    - id: NODE_T3_ORDER_SHOW
      name: 展示下单卡片
      depends_on:
        - 一个商户
        - 预订洗车/检测项目
      description: 引导车主通过专用链接进入下单界面；
      output: