# ============================================================
# 场景配置示例文件
#
# 本文件定义了完整的决策树 + 场景配置，供业务团队参考填写。
# 实际使用时按此格式维护，系统运行时读取本文件。
#
# 结构说明：
#   meta       → 元信息和因子声明
#   stages     → 阶段定义（S1/S2），每个阶段有需要收集的槽位
#   tree       → 决策树，条件判断，定位到具体场景
#   scenes     → 场景定义，每个场景有目标、槽位、工具、策略
# ============================================================


# ============================================================
# 元信息
# ============================================================
meta:
  version: "2.0"
  description: 养车预订服务场景配置

  # ── 因子声明 ──
  # 决策树节点的 if 条件用到的因子，分三类

  factors:

    # 槽位因子：从 SlotState 直读，零成本
    # 格式：slot.{槽位名}
    slot_factors:
      - slot.project_id
      - slot.project_name
      - slot.saving_plan_type
      - slot.merchant
      - slot.booking_time

    # 关键词因子：字符串匹配，零成本
    # 格式：intent.{因子名}，值为 true/false
    keyword_factors:
      - name: intent.has_urgent
        keywords: [抛锚, 事故, 打不着火, 冒烟, 漏油严重]

    # BMA 因子：需要小模型判断，按需调用
    # 支持 bool 型（true/false）和 enum 型（从选项中选一个）
    bma_factors:
      bool:
        - name: intent.has_car_service
          description: 用户消息是否涉及养车、保养、维修、车辆问题
        - name: intent.has_platform_question
          description: 用户是否在询问平台能力或九折机制

      enum:
        - name: intent.project_category
          description: 用户提到的养车项目大类
          options: [保险, 轮胎, 机油保养, 钣喷, 洗车, 检测, 模糊, 症状, 无]
        - name: intent.expression_clarity
          description: 用户表达的具体程度
          options: [specific, vague, symptom]
        - name: intent.secondary_category
          description: 次要项目大类（用户同时提到多个项目时）
          options: [保险, 轮胎, 机油保养, 钣喷, 洗车, 检测, 无]

  # BMA 并行调用配置
  bma_config:
    max_factors_per_call: 10         # 单次调用最大因子数，超过则并行拆分
    parallel_enabled: true
    groups:
      - name: coarse                 # 粗分类组（先求值）
        factors: [intent.has_car_service, intent.project_category,
                  intent.has_platform_question]
      - name: fine                   # 细分类组（可与粗分类并行）
        factors: [intent.expression_clarity, intent.secondary_category]


# ============================================================
# 阶段定义
# ============================================================
stages:
  S1:
    name: 初步建立
    description: 确认养车项目和省钱方案
    slots:
      project_id:       { required: true, label: 养车项目ID }
      project_name:     { required: true, label: 养车项目名称 }
      vehicle_info:     { required: conditional, label: 车型信息 }
      saving_plan_type: { required: true, label: 省钱方案类型 }

  S2:
    name: 执行落地
    description: 确认商户和时间，完成预订
    slots:
      merchant:     { required: true, label: 选定商户 }
      location:     { required: conditional, label: 用户位置 }
      booking_time: { required: true, label: 预约时间 }


# ============================================================
# 决策树
# ============================================================
#
# 规则：从上到下匹配，第一个命中的进入子树或返回场景
# 节点类型：
#   条件 → 场景：  { if: "条件", scene: 场景ID }
#   条件 → 子树：  { if: "条件", children: [...] }
#   兜底（无条件）：{ scene: 场景ID }  ← 必须是同级最后一个
#
# 条件表达式语法：
#   slot.xxx                         → 槽位有值
#   NOT slot.xxx                     → 槽位无值
#   intent.xxx                       → bool 因子为 true
#   intent.xxx == "值"               → 分类因子等于某值
#   条件1 AND 条件2                   → 同时满足
#   条件1 OR 条件2                    → 满足其一
# ============================================================

tree:

  # 1. 紧急
  - if: intent.has_urgent
    scene: URGENT

  # 2. 有明确养车意图 → 按意图路由（不管 slot 有没有值）
  - if: intent.has_car_service
    children:
      - if: intent.project_category == "保险"
        scene: INSURANCE_PROJECT
      - if: intent.project_category == "症状"
        scene: SYMPTOM_DIAGNOSE
      - if: intent.expression_clarity == "specific"
        scene: DIRECT_PROJECT
      - if: intent.expression_clarity == "symptom"
        scene: SYMPTOM_DIAGNOSE
      - scene: FUZZY_PROJECT

  # 3. 问平台
  - if: intent.has_platform_question
    scene: PLATFORM_INQUIRY

  # 4. 没有明确意图 → 按 slot 状态推进
  - if: slot.project_id AND slot.saving_plan_type
    children:
      - if: NOT slot.merchant
        scene: FIND_MERCHANT
      - if: NOT slot.booking_time
        scene: CONFIRM_BOOKING
      - scene: COMPLETED

  - if: slot.project_id
    scene: SAVING_PLAN

  # 5. 兜底
  - scene: CASUAL_CHAT


# ============================================================
# 场景定义
# ============================================================
#
# 每个场景包含：
#   name         → 人类可读名称
#   stage        → 所属阶段 S1/S2/any
#   goal         → 目标描述（给 LLM 看）
#   target_slots → 要收集的槽位（每个有 label、required、method）
#   tools        → 可用工具列表（硬约束，未列的工具 LLM 用不了）
#   skills       → 可用 Skill 列表（含连字符的子 Agent 能力）
#   exit_when    → 退出条件（表达式语法同决策树）
#   strategy     → 沟通策略（给 LLM 看的自然语言指引）
#
# 注意：
#   - tools 是硬约束，决定了 LLM 能做什么
#   - strategy 是软指引，决定了 LLM 怎么做
#   - target_slots.method 告诉 LLM 每个信息具体怎么拿
#   - 退出后不指定 next，决策树自动重新求值确定下一个场景
# ============================================================

scenes:

  # ────────────────────────────────
  # 跨阶段场景
  # ────────────────────────────────

  URGENT:
    name: 紧急救援
    stage: any
    goal: 快速响应紧急情况，帮用户解决当前问题
    target_slots: {}
    tools: [search_shops]
    skills: []
    exit_when: 用户问题已处理
    strategy: |
      优先解决紧急问题，跳过省钱流程。
      帮用户找最近的店或叫救援。

  # ────────────────────────────────
  # S1 场景
  # ────────────────────────────────

  CASUAL_CHAT:
    name: 闲聊
    stage: S1
    goal: 在自然交流中引导用户发现养车需求
    target_slots: {}
    tools: []
    skills: [platform-intro]
    exit_when: 用户提到养车相关话题
    strategy: |
      正常交流，每 2-3 轮穿插一次平台价值引导。
      例："对了，您的车最近有保养计划吗？我们预订可以打九折。"
      不追问，等用户自己提起。

  PLATFORM_INQUIRY:
    name: 了解平台
    stage: S1
    goal: 建立平台认知，引导到养车需求
    target_slots: {}
    tools: []
    skills: [platform-intro]
    exit_when: 用户了解平台或提出项目需求
    strategy: |
      介绍平台能力和九折机制。
      介绍完自然过渡到需求询问。

  DIRECT_PROJECT:
    name: 直接表达项目
    stage: S1
    goal: 把用户说出的项目名匹配到标准项目，确认后获取项目ID
    target_slots:
      project_id:
        label: 养车项目ID
        required: true
        method: 调用 match_project 将用户描述匹配到标准项目
      project_name:
        label: 养车项目名称
        required: true
        method: 从 match_project 结果中获取
      vehicle_info:
        label: 车型信息
        required: conditional
        condition: match_project 返回的项目需要车型时
        method: 调用 collect_car_info 引导用户提供
    tools: [match_project, collect_car_info]
    skills: []
    exit_when: "slot.project_id"
    strategy: |
      用户已说出项目名，直接用 match_project 匹配确认。
      确认后询问车型（如需要）。
      不要追问不必要的细节。

  SYMPTOM_DIAGNOSE:
    name: 症状描述
    stage: S1
    goal: 根据用户描述的症状推断可能的养车项目
    target_slots:
      project_id:
        label: 养车项目ID
        required: true
        method: 调用 diagnose-car 分析症状，再用 match_project 匹配项目
      project_name:
        label: 养车项目名称
        required: true
        method: 从诊断和匹配结果中获取
    tools: [knowledge_base_search, match_project]
    skills: [diagnose-car]
    exit_when: "slot.project_id"
    strategy: |
      根据症状推断可能的项目。
      最多追问 2 轮细化症状描述。
      收束不了就建议到店检查。

  INSURANCE_PROJECT:
    name: 保险项目
    stage: S1
    goal: 确认保险相关的养车项目，走保险理赔流程
    target_slots:
      project_id:
        label: 养车项目ID
        required: true
        method: 确认保险报案情况，匹配对应的维修项目
      project_name:
        label: 养车项目名称
        required: true
        method: 从保险定损或用户描述中确认
    tools: [match_project, knowledge_base_search]
    skills: []
    exit_when: "slot.project_id"
    strategy: |
      确认是否已报案、是否有定损单。
      根据保险情况匹配对应维修项目。
      涉及理赔的提醒用户保留相关证据。

  FUZZY_PROJECT:
    name: 模糊意图
    stage: S1
    goal: 引导用户将模糊的养车需求具体化为明确的项目
    target_slots:
      project_id:
        label: 养车项目ID
        required: true
        method: 通过引导和 match_project 逐步收束到具体项目
      project_name:
        label: 养车项目名称
        required: true
        method: 从匹配结果中获取
    tools: [match_project, knowledge_base_search]
    skills: []
    exit_when: "slot.project_id"
    strategy: |
      引导用户具体化需求。
      提供常见项目选项让用户选。
      最多 2 轮引导，收束不了推荐最常见方案。

  SAVING_PLAN:
    name: 确认省钱方案
    stage: S1
    goal: 为已确认的项目选择合适的省钱方式
    target_slots:
      saving_plan_type:
        label: 省钱方案类型
        required: true
        method: 查询可选方案后与用户沟通选择
    tools: [check_coupon_eligibility]
    skills: [saving-strategy-guide, price-inquiry]
    exit_when: "slot.saving_plan_type"
    strategy: |
      查询该项目可选的省钱方案。
      向用户介绍各方案优劣并帮助选择。
      如超出能力边界，友好告别。

  COMPLETED:
    name: S1 完成
    stage: S1
    goal: S1 阶段所有槽位已收集完毕，准备进入 S2
    target_slots: {}
    tools: []
    skills: []
    exit_when: 自动进入 S2
    strategy: 告知用户项目和方案已确认，接下来帮忙找店和预订。

  # ────────────────────────────────
  # S2 场景
  # ────────────────────────────────

  FIND_MERCHANT:
    name: 搜索商户
    stage: S2
    goal: 根据用户位置和项目需求找到合适的商户
    target_slots:
      merchant:
        label: 选定商户
        required: true
        method: 调用 search_shops 搜索后帮用户比较选择
      location:
        label: 用户位置
        required: conditional
        condition: 需要搜索附近商户时
        method: 调用 collect_location 获取位置
    tools: [search_shops, collect_location]
    skills: [merchant-search-and-confirm]
    exit_when: "slot.merchant"
    strategy: |
      根据用户位置搜索合适的商户。
      展示候选列表，帮用户比较选择。

  CONFIRM_BOOKING:
    name: 确认预订
    stage: S2
    goal: 汇总所有信息形成预订方案，用户确认后执行下单
    target_slots:
      booking_time:
        label: 预约时间
        required: true
        method: 与用户确认合适的到店时间
    tools: [confirm_booking]
    skills: [booking-plan-builder, booking-execution]
    exit_when: "slot.booking_time"
    strategy: |
      汇总项目、价格、商户、优惠信息形成预订方案。
      让用户确认后执行预订。


# ============================================================
# 如何新增场景（给业务团队的指引）
# ============================================================
#
# 1. 在 meta.factors 中声明新的决策因子（如果需要）
#    - 关键词因子：加 keywords 列表
#    - BMA 因子：加 description 和 options（enum 型）
#
# 2. 在 tree 中添加条件分支
#    - 找到合适的位置（按优先级和 slot 状态）
#    - 写 if 条件 + scene ID
#
# 3. 在 scenes 中定义新场景
#    - 必填：name, stage, goal, target_slots, tools, exit_when, strategy
#    - target_slots 里每个槽位要写 label, required, method
#    - tools 只列真正需要的（这是硬约束）
#
# 4. 判断是否需要新场景的标准：
#    ✅ 需要不同的工具 → 新场景
#    ✅ 需要完全不同的沟通策略 → 新场景
#    ❌ 只是内容不同（如不同的轮胎服务）→ 合并到同一场景，内部区分
#
# 示例：新增"二手车检测"场景
#
#   step 1: 加因子
#     bma_factors.enum.project_category.options 加入 "二手车检测"
#
#   step 2: 加决策树分支
#     在 "有养车意图" 的 children 中加：
#     - if: intent.project_category == "二手车检测"
#       scene: USED_CAR_INSPECTION
#
#   step 3: 定义场景
#     USED_CAR_INSPECTION:
#       name: 二手车检测
#       stage: S1
#       goal: 确认二手车检测需求，安排全车检测服务
#       target_slots:
#         project_id:
#           label: 检测项目ID
#           required: true
#           method: 确认检测类型（全车/指定部位），匹配对应项目
#       tools: [match_project, collect_car_info]
#       exit_when: "slot.project_id"
#       strategy: |
#         确认是买车前检测还是日常检测。
#         了解车辆基本信息（年份、里程）。
#         推荐合适的检测套餐。
