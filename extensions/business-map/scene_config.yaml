# ============================================================
# BMA 因子定义
#
# 小模型从用户消息 + 对话历史中提取意图因子，返回给 MainAgent hook
# ============================================================

factors:
  bool:
    - name: intent.confirmed_saving_method
      description: 用户是否在已明确养车项目的前提下，确认了一种具体的省钱方式（零部件九折、保险竞价、商户自有优惠中的任一种）。如果用户只是泛泛地说"好的用九折"但没有明确要做什么项目，不算确认。
