# ============================================================
# BMA 场景定义
#
# 小模型从用户消息 + 对话历史中判断用户意图所属场景
# 合法场景：saving, shop, insurance
# ============================================================

scenes:
  - id: saving
    description: 用户想省钱——包括查找商家优惠活动、平台优惠券、预订养车服务、使用平台九折
    keywords: [优惠, 活动, 券, 折扣, 便宜, 划算, 预订, 预约, 下单, 九折, 保养, 换机油]
  - id: shop
    description: 用户想找商家、修理厂、4S店
    keywords: [找店, 附近, 修理厂, 4S, 门店]
  - id: insurance
    description: 用户想买保险、续保、保险理赔
    keywords: [保险, 续保, 理赔, 出险, 车险]
